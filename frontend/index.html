<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 導遊小助手</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #chat-box { border: 1px solid #ccc; height: 400px; padding: 10px; overflow-y: auto; margin-bottom: 10px; border-radius: 8px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user { background-color: #e3f2fd; text-align: right; }
        .bot { background-color: #f5f5f5; text-align: left; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>AI 旅遊導遊</h2>
    <div id="chat-box">
        <div class="msg bot">你好！我是你的專屬 AI 導遊，想去哪裡玩呢？</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="輸入你想去的地方或需求...">
        <button onclick="sendMessage()">送出</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
